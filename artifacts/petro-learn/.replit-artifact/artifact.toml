kind = "web"
previewPath = "/"
title = "PetroLearn - Reservoir Petrophysics"
version = "1.0.0"
id = "artifacts/petro-learn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21828

[services.development]
run = "pnpm --filter @workspace/petro-learn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petro-learn", "run", "build" ]
publicDir = "artifacts/petro-learn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21828"
BASE_PATH = "/"
